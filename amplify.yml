version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefix frontend
    build:
      commands:
        - sed -i "s|BACKEND_API_URL_PLACEHOLDER|${API_BASE_URL:-/api/v1}|g" frontend/src/environments/environment.production.ts
        - npm run build --prefix frontend
  artifacts:
    baseDirectory: frontend/dist/frontend/browser
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
