<app-page-header title="Analytics" subtitle="Insights and portal metrics"></app-page-header>

<div class="analytics-container">
  @if (loading) {
    <div class="loading-state">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Crunching portal data...</p>
    </div>
  } @else if (errorMessage()) {
    <app-error-retry
      [errorMessage]="errorMessage()!"
      (retry)="refresh()"
    ></app-error-retry>
  } @else {
    <div class="grid">
      <app-card title="Requests by Status" class="chart-card">
        <div class="chart-wrapper">
          <ngx-charts-pie-chart
            [scheme]="colorScheme"
            [results]="stats?.statusBreakdown"
            [gradient]="gradient"
            [legend]="showLegend"
            [labels]="true"
            [doughnut]="true"
          >
          </ngx-charts-pie-chart>
        </div>
      </app-card>

      <app-card title="Verification Trends" class="chart-card">
        <div class="chart-wrapper">
          <ngx-charts-bar-vertical
            [scheme]="colorScheme"
            [results]="stats?.verificationTrends"
            [gradient]="gradient"
            [xAxis]="showXAxis"
            [yAxis]="showYAxis"
            [legend]="showLegend"
            [showXAxisLabel]="showXAxisLabel"
            [showYAxisLabel]="showYAxisLabel"
            xAxisLabel="Date"
            yAxisLabel="Verifications"
          >
          </ngx-charts-bar-vertical>
        </div>
      </app-card>

      <app-card title="Role Distribution" class="chart-card full-width">
        <div class="chart-wrapper">
          <ngx-charts-bar-horizontal
            [scheme]="colorScheme"
            [results]="stats?.roleDistribution"
            [gradient]="gradient"
            [xAxis]="showXAxis"
            [yAxis]="showYAxis"
            [legend]="showLegend"
            [showXAxisLabel]="showXAxisLabel"
            [showYAxisLabel]="showYAxisLabel"
            xAxisLabel="Users"
            yAxisLabel="Role"
          >
          </ngx-charts-bar-horizontal>
        </div>
      </app-card>
    </div>
  }
</div>
