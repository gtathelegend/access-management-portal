<app-page-header
  title="Analytics"
  subtitle="Insights and portal metrics"
  eyebrow="Executive summary"
></app-page-header>

<div class="analytics-container">
  @if (loading) {
    <div class="grid">
      <app-skeleton-chart kind="pie"></app-skeleton-chart>
      <app-skeleton-chart kind="column"></app-skeleton-chart>
      <app-skeleton-chart kind="bar" [wide]="true"></app-skeleton-chart>
    </div>
  } @else if (errorMessage()) {
    <app-error-retry
      [errorMessage]="errorMessage()!"
      (retry)="refresh()"
    ></app-error-retry>
  } @else {
    <div class="grid">
      <app-card title="Requests by Status" eyebrow="Breakdown" class="chart-card" [divider]="true">
        <div class="chart-wrapper">
          <ngx-charts-pie-chart
            [scheme]="colorScheme"
            [results]="stats?.verificationStats?.statusBreakdown"
            [gradient]="gradient"
            [legend]="showLegend"
            [labels]="true"
            [doughnut]="true"
          >
          </ngx-charts-pie-chart>
        </div>
      </app-card>

      <app-card title="Verification Trends" eyebrow="Momentum" class="chart-card" [divider]="true">
        <div class="chart-wrapper">
          <ngx-charts-bar-vertical
            [scheme]="colorScheme"
            [results]="stats?.verificationStats?.verificationTrends"
            [gradient]="gradient"
            [xAxis]="showXAxis"
            [yAxis]="showYAxis"
            [legend]="showLegend"
            [showXAxisLabel]="showXAxisLabel"
            [showYAxisLabel]="showYAxisLabel"
            xAxisLabel="Date"
            yAxisLabel="Verifications"
          >
          </ngx-charts-bar-vertical>
        </div>
      </app-card>

      <app-card title="Role Distribution" eyebrow="Access mix" class="chart-card full-width" [divider]="true">
        <div class="chart-wrapper">
          <ngx-charts-bar-horizontal
            [scheme]="colorScheme"
            [results]="stats?.verificationStats?.roleDistribution"
            [gradient]="gradient"
            [xAxis]="showXAxis"
            [yAxis]="showYAxis"
            [legend]="showLegend"
            [showXAxisLabel]="showXAxisLabel"
            [showYAxisLabel]="showYAxisLabel"
            xAxisLabel="Users"
            yAxisLabel="Role"
          >
          </ngx-charts-bar-horizontal>
        </div>
      </app-card>
    </div>
  }
</div>
