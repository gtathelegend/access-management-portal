<app-page-header
  title="Dashboard"
  subtitle="Overview of access requests and policy health"
></app-page-header>

<div class="grid">
  <mat-card class="stat">
    <mat-card-title>Open Requests</mat-card-title>
    <div class="value">12</div>
    <div class="hint">Pending approvals</div>
  </mat-card>

  <mat-card class="stat">
    <mat-card-title>Avg. Approval Time</mat-card-title>
    <div class="value">2.1h</div>
    <div class="hint">Last 7 days</div>
  </mat-card>

  <mat-card class="stat">
    <mat-card-title>Policy Exceptions</mat-card-title>
    <div class="value">3</div>
    <div class="hint">Needs review</div>
  </mat-card>

  <mat-card class="stat">
    <mat-card-title>Connected Apps</mat-card-title>
    <div class="value">8</div>
    <div class="hint">Provisioned</div>
  </mat-card>
</div>

<div class="two-col">
  <mat-card class="panel">
    <mat-card-title>Recent activity</mat-card-title>
    <mat-card-content>
      <div class="placeholder">Wire this to audit logs.</div>
    </mat-card-content>
  </mat-card>

  <mat-card class="panel">
    <mat-card-title>Approvals queue</mat-card-title>
    <mat-card-content>
      <div class="placeholder">Wire this to approval workflow.</div>
    </mat-card-content>
  </mat-card>
</div>
