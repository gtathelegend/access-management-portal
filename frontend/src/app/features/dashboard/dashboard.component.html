<app-page-header
  title="Dashboard"
  subtitle="Overview of access requests and policy health"
></app-page-header>

<div class="stats-grid">
  <app-card [compact]="true">
    <div class="stat-item">
      <span class="stat-label">Open Requests</span>
      <div class="stat-value">12</div>
      <span class="stat-hint">Pending approvals</span>
    </div>
  </app-card>

  <app-card [compact]="true">
    <div class="stat-item">
      <span class="stat-label">Avg. Approval Time</span>
      <div class="stat-value">2.1h</div>
      <span class="stat-hint">Last 7 days</span>
    </div>
  </app-card>

  <app-card [compact]="true">
    <div class="stat-item">
      <span class="stat-label">Policy Exceptions</span>
      <div class="stat-value">3</div>
      <span class="stat-hint warning">Needs review</span>
    </div>
  </app-card>

  <app-card [compact]="true">
    <div class="stat-item">
      <span class="stat-label">Connected Apps</span>
      <div class="stat-value">8</div>
      <span class="stat-hint">Provisioned</span>
    </div>
  </app-card>
</div>

<div class="two-col">
  <app-card title="Recent activity" class="panel">
    <div class="placeholder">Wire this to audit logs.</div>
  </app-card>

  <app-card title="Approvals queue" class="panel">
    <div class="placeholder">Wire this to approval workflow.</div>
  </app-card>
</div>
