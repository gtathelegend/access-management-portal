<app-page-header title="Your dashboard" subtitle="Track your access requests and approvals"></app-page-header>

<div class="grid">
  <mat-card class="stat">
    <mat-card-title>My open requests</mat-card-title>
    <div class="value">2</div>
    <div class="hint">In review</div>
  </mat-card>

  <mat-card class="stat">
    <mat-card-title>Approved this month</mat-card-title>
    <div class="value">5</div>
    <div class="hint">Completed</div>
  </mat-card>

  <mat-card class="stat">
    <mat-card-title>Access expiring</mat-card-title>
    <div class="value">1</div>
    <div class="hint">Next 14 days</div>
  </mat-card>

  <mat-card class="stat">
    <mat-card-title>Connected apps</mat-card-title>
    <div class="value">3</div>
    <div class="hint">Assigned</div>
  </mat-card>
</div>

<div class="two-col">
  <mat-card class="panel">
    <mat-card-title>Recent activity</mat-card-title>
    <mat-card-content>
      <div class="placeholder">Wire this to audit logs.</div>
    </mat-card-content>
  </mat-card>

  <mat-card class="panel">
    <mat-card-title>Recommended access</mat-card-title>
    <mat-card-content>
      <div class="placeholder">Wire this to request templates.</div>
    </mat-card-content>
  </mat-card>
</div>
