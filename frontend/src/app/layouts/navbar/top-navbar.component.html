<header class="navbar">
  <div class="navbar-left">
    <button
      *ngIf="showMenuButton"
      class="icon-btn menu-toggle"
      (click)="menuToggle.emit()"
      aria-label="Toggle navigation"
    >
      <span class="material-icons">menu</span>
    </button>
  </div>

  <div class="navbar-center">
    <div class="search-bar">
      <span class="material-icons search-icon">search</span>
      <input type="text" placeholder="Search anything..." aria-label="Search" />
      <div class="search-shortcut">
        <span class="shortcut-key">⌘</span>
        <span class="shortcut-key">K</span>
      </div>
    </div>
  </div>

  <div class="navbar-right">
    <div class="actions">
      <button class="icon-btn" aria-label="Notifications">
        <span class="material-icons">notifications_none</span>
      </button>

      <button
        class="icon-btn"
        (click)="toggleTheme()"
        [attr.aria-label]="themeMode() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <span class="material-icons">
          {{ themeMode() === 'dark' ? 'light_mode' : 'dark_mode' }}
        </span>
      </button>

      <div class="user-trigger" [matMenuTriggerFor]="userMenu">
        <div class="avatar-small">{{ avatarLabel }}</div>
      </div>
    </div>
  </div>

  <mat-menu #userMenu="matMenu" class="user-dropdown">
    <div class="user-dropdown-header" *ngIf="user() as u">
      <div class="dropdown-name">{{ u.name }}</div>
      <div class="dropdown-email">{{ u.email }}</div>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Sign out</span>
    </button>
  </mat-menu>
</header>

<div class="loading-container" *ngIf="loading | async">
  <div class="loading-bar"></div>
</div>
