<mat-toolbar class="topbar">
  <button
    *ngIf="showMenuButton"
    mat-icon-button
    class="menu-button"
    type="button"
    aria-label="Open navigation"
    (click)="menuToggle.emit()"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <div class="topbar-center">
    <div class="search-shell">
      <mat-icon aria-hidden="true">search</mat-icon>
      <input type="text" placeholder="Search users, records..." aria-label="Search" />
      <div class="shortcut">⌘ K</div>
    </div>
  </div>

  <div class="topbar-actions">
    @if (loading | async) {
      <mat-progress-bar mode="indeterminate" class="loading-bar"></mat-progress-bar>
    }

    <button mat-icon-button type="button" aria-label="Notifications" disabled>
      <mat-icon>notifications_none</mat-icon>
    </button>

    <button
      mat-icon-button
      type="button"
      aria-label="Toggle theme"
      (click)="toggleTheme()"
    >
      <mat-icon>{{ themeMode() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <button class="avatar-button" mat-icon-button type="button" aria-label="User menu" [matMenuTriggerFor]="userMenu">
      <span class="avatar-fallback">{{ avatarLabel }}</span>
    </button>
  </div>

  <mat-menu #userMenu="matMenu">
    <div class="user-summary" *ngIf="user() as u">
      <div class="user-name">{{ u.name }}</div>
      <div class="user-email">{{ u.email }}</div>
    </div>

    <button mat-menu-item type="button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
