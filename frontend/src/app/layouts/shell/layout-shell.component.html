<div class="shell" [class.sidebar-open]="sidenavOpened() || !isHandset()" [class.sidebar-collapsed]="sidebarCollapsed()">
  <div class="shell-backdrop" [class.visible]="isHandset() && sidenavOpened()" (click)="toggleSidenav()"></div>

  <aside class="sidebar-wrapper" [class.mobile-open]="sidenavOpened() && isHandset()">
    <app-sidebar-nav [collapsed]="sidebarCollapsed()"></app-sidebar-nav>
  </aside>

  <div class="main-container">
    <app-top-navbar
      [showMenuButton]="isCompactSidebar()"
      (menuToggle)="toggleSidenav()"
    ></app-top-navbar>

    <main class="page-content" (click)="closeSidenavIfHandset()">
      <div class="page-inner">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
