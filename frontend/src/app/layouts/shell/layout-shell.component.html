<div class="shell" [class.sidebar-open]="sidenavOpened() || !isHandset()">
  <aside class="sidebar-wrapper" [class.mobile-open]="sidenavOpened() && isHandset()">
    <app-sidebar-nav></app-sidebar-nav>
  </aside>

  <div class="main-container">
    <app-top-navbar
      [showMenuButton]="isHandset()"
      (menuToggle)="toggleSidenav()"
    ></app-top-navbar>

    <main class="page-content" (click)="closeSidenavIfHandset()">
      <div class="page-inner">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <div 
    *ngIf="isHandset() && sidenavOpened()" 
    class="sidebar-overlay" 
    (click)="toggleSidenav()"
  ></div>
</div>
