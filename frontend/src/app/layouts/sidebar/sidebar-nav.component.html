<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">AMP</div>
    <div class="copy">
      <div class="eyebrow">Access portal</div>
      <div class="subtitle">Operations console</div>
    </div>
  </div>

  <mat-divider></mat-divider>

  <mat-nav-list class="nav">
    @for (item of items; track item.route) {
      <a
        mat-list-item
        class="nav-item"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    }
  </mat-nav-list>

  <div class="sidebar-footer">
    <div class="profile-card" *ngIf="user() as u">
      <div class="profile-avatar">{{ avatarLabel }}</div>
      <div class="profile-copy">
        <div class="profile-name">{{ u.name }}</div>
        <div class="profile-role">{{ u.role | titlecase }}</div>
      </div>
      <mat-icon class="profile-chevron">chevron_right</mat-icon>
    </div>
  </div>
</div>
