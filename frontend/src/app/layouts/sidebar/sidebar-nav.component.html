<div class="sidebar">
  <div class="sidebar-top">
    <div class="brand">
      <div class="logo-box">
        <span class="logo-icon">A</span>
      </div>
      <div class="brand-text">
        <h2 class="brand-name">Portal</h2>
        <p class="brand-subtitle">Management</p>
      </div>
    </div>

    <nav class="nav">
      @for (item of items; track item.route) {
        <a
          class="nav-link"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <span class="nav-icon material-icons">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>

  <div class="sidebar-bottom">
    <div class="user-profile" *ngIf="user() as u">
      <div class="avatar">
        {{ avatarLabel }}
      </div>
      <div class="user-info">
        <span class="user-name">{{ u.name }}</span>
        <span class="user-role">{{ u.role | titlecase }}</span>
      </div>
      <span class="material-icons more-icon">unfold_more</span>
    </div>
  </div>
</div>
