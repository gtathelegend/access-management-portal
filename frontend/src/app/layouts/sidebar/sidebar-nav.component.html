<div class="sidebar">
  <div class="sidebar-top">
    <div class="brand">
      <div class="logo-box">
        <span class="logo-icon">A</span>
      </div>
      <div class="brand-text">
        <div class="brand-name">Access Portal</div>
        <div class="brand-subtitle">Enterprise Console</div>
      </div>
    </div>

    <div class="nav-section-label">Workspace</div>

    <nav class="nav" aria-label="Primary">
      @for (item of items; track item.route) {
        <a
          class="nav-link"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <span class="nav-icon material-icons">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>

  <div class="sidebar-bottom">
    <div class="workspace-card">
      @for (stat of workspaceStats; track stat.label) {
        <div class="workspace-metric">
          <span class="metric-label">{{ stat.label }}</span>
          <span class="metric-value" [class]="'tone-' + stat.tone">{{ stat.value }}</span>
        </div>
      }
    </div>

    <div class="user-profile" *ngIf="user() as u">
      <div class="avatar">
        {{ avatarLabel }}
      </div>
      <div class="user-info">
        <span class="user-name">{{ u.name }}</span>
        <span class="user-role">{{ u.role | titlecase }}</span>
      </div>
      <span class="material-icons more-icon">more_horiz</span>
    </div>
  </div>
</div>
