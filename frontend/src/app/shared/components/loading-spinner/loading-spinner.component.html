@if (loadingService.loading$ | async) {
	<div class="spinner-overlay" aria-live="polite" aria-busy="true">
		<div class="spinner-card">
			<mat-progress-spinner mode="indeterminate" diameter="44"></mat-progress-spinner>
			<div class="copy">
				<div class="title">Loading workspace</div>
				<div class="subtitle">Fetching the latest data and keeping the UI in sync.</div>
			</div>
		</div>
	</div>
}
