@if (loadingService.state$ | async; as loading) {
	@if (loading.isBusy) {
		<div class="loading-overlay" aria-live="polite" aria-busy="true">
			<div class="loading-rail">
				<mat-progress-bar mode="indeterminate"></mat-progress-bar>
			</div>

			<div class="loading-card">
				<mat-progress-spinner mode="indeterminate" diameter="32"></mat-progress-spinner>
				<div class="copy">
					<div class="title">{{ loading.message }}</div>
					<div class="subtitle">{{ loading.detail }}</div>
					<div class="meta-row">
						<span class="meta-pill">{{ loading.phase }}</span>
						<span class="meta-pill">{{ loading.activeRequests }} request(s)</span>
					</div>
				</div>
			</div>
		</div>
	}
}
