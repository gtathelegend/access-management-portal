<app-modal [title]="data.title" [hasFooter]="true" [compact]="true" [icon]="data.danger ? 'warning' : 'help_outline'">
  <p class="dialog-message">{{ data.message }}</p>

  <div modalFooter class="dialog-actions">
    <app-button variant="ghost" size="sm" (btnClick)="cancel()">
      {{ data.cancelText ?? 'Cancel' }}
    </app-button>
    <app-button
      [variant]="data.danger ? 'danger' : 'primary'"
      size="sm"
      (btnClick)="confirm()"
    >
      {{ data.confirmText ?? 'Confirm' }}
    </app-button>
  </div>
</app-modal>
